name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Permisos requeridos por el deploy nativo de GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Solo un deploy a la vez; cancela runs viejos si hay uno nuevo en cola
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ─── Job 1: Build ────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Vite falla el build si hay warnings de TypeScript/ESLint — fuerza errores visibles
          CI: true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

  # ─── Job 2: Deploy (solo corre si build pasó) ────────────────────────────────
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
